services:
  - type: web
    name: luxstay-hotel
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_OUTPUT
        value: standalone
      - key: DATABASE_URL
        sync: false          # set this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure value
    healthCheckPath: /api/auth/me
    autoDeploy: true
